<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physics M.6</title>
    
    <meta name="theme-color" content="#050505">
    <link rel="manifest" href="manifest.json">
    
    <!-- iOS / Safari PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Physics M.6">
    <link rel="apple-touch-icon" href="picture/apple-touch-icon.png">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Sarabun:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        /* Cyberpunk & Luxury Custom Styles */
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --luxury-gold: #ffd700;
            --neon-red: #ff3333;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.08) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 255, 0.08) 0%, transparent 25%);
            color: #e0e0e0;
            font-family: 'Rajdhani', 'Sarabun', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-cyber {
            font-family: 'Orbitron', sans-serif;
        }

        /* Glassmorphism Card */
        .glass-panel {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Neon Glow Effects */
        .glow-text-blue {
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.7);
        }

        .glow-text-gold {
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }

        .glow-text-red {
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.7);
        }

        .cyber-btn {
            position: relative;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.1), transparent);
            border: 1px solid var(--neon-blue);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .cyber-btn:hover {
            background: rgba(0, 243, 255, 0.15);
            box-shadow: 0 0 15px var(--neon-blue);
            transform: translateY(-2px);
        }

        .cyber-btn:active {
            transform: scale(0.95);
        }

        .luxury-btn {
            border-color: var(--luxury-gold);
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            color: var(--luxury-gold);
        }

        .luxury-btn:hover {
            background: rgba(255, 215, 0, 0.15);
            box-shadow: 0 0 15px var(--luxury-gold);
        }

        /* Category Specific Borders & Glows */
        .border-school {
            border-color: var(--neon-blue);
        }

        .border-work {
            border-color: var(--luxury-gold);
        }

        .border-dev {
            border-color: var(--neon-red);
        }

        .hover-school:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .hover-work:hover {
            border-color: var(--luxury-gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .hover-dev:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
        }

        .text-school {
            color: var(--neon-blue);
        }

        .text-work {
            color: var(--luxury-gold);
        }

        .text-dev {
            color: var(--neon-red);
        }

        /* Link Card Styles */
        .link-card {
            background: rgba(30, 30, 30, 0.6);
            border-left-width: 3px;
            transition: all 0.3s ease;
        }

        .link-card:hover {
            background: rgba(40, 40, 40, 0.8);
            transform: scale(1.02);
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid var(--neon-blue);
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Mobile Menu Animation */
        #mobile-menu {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }

        #mobile-menu.open {
            max-height: 250px;
            opacity: 1;
        }

        /* Select Input Styling */
        select option {
            background-color: #0a0a0a;
            color: white;
        }

        /* iOS Safe Area Support */
        header {
            padding-top: calc(1rem + env(safe-area-inset-top, 0px)) !important;
        }
        @media (min-width: 768px) {
            header {
                padding-top: 1.5rem !important;
            }
        }
        footer {
            padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px)) !important;
        }
    </style>
</head>

<body class="flex flex-col items-center">

    <header

        <div id="mobile-menu" class="w-full bg-[#111] border-b border-[#00f3ff]/30 md:hidden z-10 absolute top-full left-0">

        </div>

    <footer class="w-full p-6 text-center text-gray-600 text-[10px] md:text-xs font-cyber z-10">
        <p>&copy; Sinece 2026 PHYSICS M.6 <span class="text-[#00f3ff]"> By Mr. Nopphorn Somboonchai</span></p>
    </footer>

    <div id="login-modal"
        class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden overflow-y-auto">
        <div class="flex min-h-full items-center justify-center p-4">

                class="glass-panel w-full max-w-md p-6 md:p-8 rounded-xl relative border border-[#00f3ff]/30 shadow-[0_0_30px_rgba(0,243,255,0.1)]">
                <div class="flex justify-between items-center mb-6 border-b border-[#00f3ff]/30 pb-2">

    <div id="add-modal"
        class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden overflow-y-auto">
        <div class="flex min-h-full items-center justify-center p-4">
            <div
                class="glass-panel w-full max-w-md p-6 md:p-8 rounded-xl relative border border-[#ff00ff]/30 shadow-[0_0_30px_rgba(255,0,255,0.1)]">
                <div class="flex justify-between items-center mb-6 border-b border-[#ff00ff]/30 pb-2">
                    <h2 id="modal-title" class="font-cyber text-xl md:text-2xl text-[#ff00ff]">ADD NEW NODE</h2>
                    <button onclick="closeModal('add-modal')" class="text-gray-500 hover:text-white">
                        <i class="fa-solid fa-times text-xl"></i>

                <form id="add-form" onsubmit="submitLink(event)">
                    <input type="hidden" id="web-id">

                    <div class="mb-4">
                        <label class="block text-xs text-[#00f3ff] mb-1 uppercase tracking-wider">Category (หมวดหมู่)</label>
                        <div class="relative">
                            <select id="web-category" required
                                class="w-full bg-[#0a0a0a] border border-gray-700 text-white p-3 pr-10 rounded focus:border-[#ff00ff] focus:outline-none focus:shadow-[0_0_10px_rgba(255,0,255,0.3)] transition-all appearance-none cursor-pointer">
                                <option value="School Work">บทที่ 15 แม่เหล็กและไฟฟ้า</option>
                                <option value="My Work">บทที่ 16 ความร้อนและแก๊ส</option>

                    <div class="mb-4">

                        <input type="number" id="web-order" placeholder="Ex. 1" min="0"

                    </div>

                    <div class="mb-4">
                        <label class="block text-xs text-[#00f3ff] mb-1 uppercase tracking-wider">Web Name</label>
                        <input type="text" id="web-name" required placeholder="Ex. Youtube"

                    </div>

                        <label class="block text-xs text-[#00f3ff] mb-1 uppercase tracking-wider">URL Destination</label>
                        <input type="url" id="web-url" required placeholder="https://..."
                            class="w-full bg-[#0a0a0a] border border-gray-700 text-white p-3 rounded focus:border-[#ff00ff] focus:outline-none focus:shadow-[0_0_10px_rgba(255,0,255,0.3)] transition-all">

                    <div class="mb-6 flex items-center gap-3">

                        <button type="submit" id="btn-save"
                            class="bg-[#ff00ff]/20 border border-[#ff00ff] text-[#ff00ff] px-6 py-3 sm:py-2 rounded hover:bg-[#ff00ff] hover:text-black transition-all font-bold tracking-wider w-full sm:w-auto">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // *** สำคัญ: นำค่า Config จาก Firebase Console ของคุณมาใส่ตรงนี้ ***
        const firebaseConfig = {
            apiKey: "AIzaSyCO7Syi9FqkChnnBkVrP8Q_Sa7gYfKgqxg",
            authDomain: "physics-learning-webapp.firebaseapp.com",
            projectId: "physics-learning-webapp",
            storageBucket: "physics-learning-webapp.firebasestorage.app",
            messagingSenderId: "234172548789",
            appId: "1:234172548789:web:7854225fe43c95bce4a0fc",
            measurementId: "G-KWPCRVHJ3Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentLinks = [];
        let isAdminLoggedIn = false;

        // เช็คสถานะการเข้าสู่ระบบ
        onAuthStateChanged(auth, (user) => {
            if (user) {
                isAdminLoggedIn = true;
                document.getElementById('admin-auth-btn').innerHTML = '<i class="fa-solid fa-unlock mr-2 text-green-400"></i> LOGOUT';
                document.getElementById('admin-auth-btn-mobile').innerHTML = '<i class="fa-solid fa-unlock mr-2 text-green-400"></i> LOGOUT';
                document.getElementById('add-btn').classList.remove('hidden');
                document.getElementById('add-btn-mobile').classList.remove('hidden');
            } else {
                isAdminLoggedIn = false;
                document.getElementById('admin-auth-btn').innerHTML = '<i class="fa-solid fa-lock mr-2"></i> ADMIN LOGIN';
                document.getElementById('admin-auth-btn-mobile').innerHTML = '<i class="fa-solid fa-lock mr-2"></i> ADMIN LOGIN';
                document.getElementById('add-btn').classList.add('hidden');
                document.getElementById('add-btn-mobile').classList.add('hidden');
            }
            if (currentLinks.length > 0) {
                renderCategorizedLinks(currentLinks);
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            fetchLinks();
        });

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.getElementById('hamburger-icon');
            menu.classList.toggle('open');
            if (menu.classList.contains('open')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-times');
            } else {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        }

        // ดึงข้อมูล Real-time
        function fetchLinks() {
            const loader = document.getElementById('loading-indicator');
            const contentArea = document.getElementById('content-area');
            const emptyState = document.getElementById('empty-state');

            loader.classList.remove('hidden');
            emptyState.classList.add('hidden');

            onSnapshot(collection(db, "links"), (snapshot) => {
                loader.classList.add('hidden');
                contentArea.innerHTML = '';

                if (snapshot.empty) {
                    emptyState.classList.remove('hidden');
                    currentLinks = [];
                } else {
                    emptyState.classList.add('hidden');
                    const links = [];
                    snapshot.forEach((doc) => {
                        links.push({ id: doc.id, ...doc.data() });
                    });

                    links.sort((a, b) => {
                        const orderA = a.order !== undefined ? Number(a.order) : 999999;
                        const orderB = b.order !== undefined ? Number(b.order) : 999999;
                        if (orderA !== orderB) {
                            return orderA - orderB;
                        }
                        const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                        const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                        return timeB - timeA;
                    });

                    currentLinks = links;
                    renderCategorizedLinks(currentLinks);
                }
            }, (error) => {
                console.error('Error connecting to database:', error);
                loader.classList.add('hidden');
                emptyState.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-6xl text-red-500 mb-4"></i><p class="text-red-400">CONNECTION ERROR</p>`;
                emptyState.classList.remove('hidden');
            });
        }

        // สร้างการ์ดและหมวดหมู่
        function renderCategorizedLinks(links) {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = '';

            const categories = [
                { id: 'School Work', title: 'บทที่ 15 แม่เหล็กและไฟฟ้า', icon: 'picture/EM.png', colorClass: 'text-school', borderClass: 'border-school', hoverClass: 'hover-school' },
                { id: 'My Work', title: 'บทที่ 16 ความร้อนและแก๊ส', icon: 'picture/thermal.png', colorClass: 'text-work', borderClass: 'border-work', hoverClass: 'hover-work' },
                { id: 'Dev Zone', title: 'บทที่ 17 ของแข็งและของไหล', icon: 'picture/solid.png', colorClass: 'text-dev', borderClass: 'border-dev', hoverClass: 'hover-dev' }
            ];

            categories.forEach(cat => {
                let catLinks = links.filter(link => (link.category || 'My Work') === cat.id);

                if (!isAdminLoggedIn) {
                    catLinks = catLinks.filter(link => link.visible !== false);
                }

                if (catLinks.length > 0) {
                    const section = document.createElement('div');
                    section.className = "mb-10";

                    const isImageIcon = cat.icon.includes('.') || cat.icon.includes('/');
                    const iconHtml = isImageIcon
                        ? `<img src="${cat.icon}" alt="${cat.title}" class="w-7 h-7 object-contain" />`
                        : `<i class="fa-solid ${cat.icon} text-2xl ${cat.colorClass}"></i>`;

                    section.innerHTML = `
                        <div class="flex items-center gap-3 mb-6 border-b border-gray-800 pb-2">
                            ${iconHtml}
                            <h2 class="font-cyber text-xl md:text-2xl font-bold text-white tracking-widest">${cat.title}</h2>
                            <span class="text-xs text-gray-500 bg-[#111] px-2 py-1 rounded border border-gray-800">${catLinks.length} NODES</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6"></div>
                    `;

                    contentArea.appendChild(section);
                    const gridContainer = section.lastElementChild;

                    catLinks.forEach(link => {
                        const isVisible = link.visible !== false;
                        const card = document.createElement('div');
                        card.className = `link-card flex flex-col justify-between rounded-r-xl relative group overflow-hidden transition-all border-l-4 ${cat.borderClass} ${cat.hoverClass} ${!isVisible ? 'opacity-40 border-dashed border-r border-t border-b border-gray-600 bg-gray-950/40' : ''}`;

                        const icon = getIconForUrl(link.url);

                        let hiddenBadge = '';
                        if (!isVisible) {
                            hiddenBadge = `
                                <div class="absolute top-2 right-2 bg-red-500/20 border border-red-500/50 text-red-400 text-[9px] px-1.5 py-0.5 rounded font-cyber tracking-wider z-20">
                                    <i class="fa-solid fa-eye-slash mr-1"></i> HIDDEN
                                </div>
                            `;
                        }

                        let adminActionsHtml = '';
                        if (isAdminLoggedIn) {
                            const linkIndex = catLinks.findIndex(l => l.id === link.id);
                            const isFirst = linkIndex === 0;
                            const isLast = linkIndex === catLinks.length - 1;

                            adminActionsHtml = `
                                <div class="px-6 pb-4 pt-2 flex items-center justify-end gap-2 border-t border-white/5 bg-black/10 relative z-20">
                                    <button onclick="event.preventDefault(); event.stopPropagation(); toggleVisibility('${link.id}', ${isVisible})" 
                                        class="${isVisible ? 'bg-green-500/15 border border-green-500/40 text-green-400 hover:bg-green-500 hover:text-black' : 'bg-gray-500/15 border border-gray-500/40 text-gray-400 hover:bg-gray-500 hover:text-black'} w-9 h-9 rounded-lg flex items-center justify-center transition-all touch-manipulation cursor-pointer" 
                                        title="${isVisible ? 'ปิดการแสดงผล (ซ่อน)' : 'เปิดการแสดงผล (แสดง)'}">
                                        <i class="fa-solid ${isVisible ? 'fa-eye' : 'fa-eye-slash'} text-sm"></i>
                                    </button>
                                    ${!isFirst ? `
                                        <button onclick="event.preventDefault(); event.stopPropagation(); moveLink('${link.id}', 'up')" 
                                            class="bg-blue-500/15 border border-blue-500/40 text-blue-400 hover:bg-blue-500 hover:text-black w-9 h-9 rounded-lg flex items-center justify-center transition-all touch-manipulation cursor-pointer" 
                                            title="ย้ายขึ้น (ก่อนหน้า)">
                                            <i class="fa-solid fa-chevron-left text-sm"></i>
                                        </button>
                                    ` : ''}
                                    ${!isLast ? `
                                        <button onclick="event.preventDefault(); event.stopPropagation(); moveLink('${link.id}', 'down')" 
                                            class="bg-blue-500/15 border border-blue-500/40 text-blue-400 hover:bg-blue-500 hover:text-black w-9 h-9 rounded-lg flex items-center justify-center transition-all touch-manipulation cursor-pointer" 
                                            title="ย้ายลง (ถัดไป)">
                                            <i class="fa-solid fa-chevron-right text-sm"></i>
                                        </button>
                                    ` : ''}
                                    <button onclick="event.preventDefault(); event.stopPropagation(); openEditModal('${link.id}')" 
                                        class="bg-yellow-500/15 border border-yellow-500/40 text-yellow-400 hover:bg-yellow-500 hover:text-black w-9 h-9 rounded-lg flex items-center justify-center transition-all touch-manipulation cursor-pointer" 
                                        title="แก้ไข">
                                        <i class="fa-solid fa-pen text-sm"></i>
                                    </button>
                                    <button onclick="event.preventDefault(); event.stopPropagation(); deleteLink('${link.id}')" 
                                        class="bg-red-500/15 border border-red-500/40 text-red-400 hover:bg-red-500 hover:text-black w-9 h-9 rounded-lg flex items-center justify-center transition-all touch-manipulation cursor-pointer" 
                                        title="ลบ">
                                        <i class="fa-solid fa-trash text-sm"></i>
                                    </button>
                                </div>
                            `;
                        }

                        card.innerHTML = `
                            <a href="${link.url}" target="_blank" class="block p-6 flex-grow decoration-none touch-manipulation active:scale-[0.98] transition-all">
                                ${hiddenBadge}
                                <div class="absolute right-0 top-0 opacity-10 group-hover:opacity-20 transition-opacity pointer-events-none">
                                    <i class="${icon} text-6xl transform rotate-12 -translate-y-2 translate-x-2 text-white"></i>
                                </div>
                                <div class="relative z-10">
                                    <h3 class="text-lg md:text-xl font-bold text-white transition-colors truncate pr-6">${link.name}</h3>
                                    <p class="text-gray-400 text-xs mt-1 truncate font-mono opacity-70">${new URL(link.url).hostname}</p>
                                    <div class="mt-4 flex items-center text-xs text-gray-500 group-hover:text-white transition-colors">
                                        <span class="${cat.colorClass}">ACCESS</span>
                                        <i class="fa-solid fa-arrow-right ml-2 transform group-hover:translate-x-1 transition-transform"></i>
                                    </div>
                                </div>
                            </a>
                            ${adminActionsHtml}
                        `;
                        gridContainer.appendChild(card);
                    });
                }
            });
        }

        // จัดการคลิกปุ่ม Admin Login / Logout
        function handleAdminAuthClick() {
            if (isAdminLoggedIn) {
                if (confirm('ต้องการออกจากระบบ Admin หรือไม่?')) {
                    signOut(auth).catch(err => console.error(err));
                }
            } else {
                document.getElementById('login-modal').classList.remove('hidden');
            }
        }

        // ฟังก์ชัน Login
        async function loginAdmin(e) {
            e.preventDefault();
            let email = document.getElementById('login-email').value.trim();
            if (email && !email.includes('@')) {
                email = email + '@hongson.ac.th';
            }
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-login');
            const originalText = btn.innerHTML;

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> DECRYPTING...';
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                document.getElementById('login-form').reset();
                closeModal('login-modal');
            } catch (error) {
                console.error('Login Error', error);
                alert('Access Denied: อีเมลหรือรหัสผ่านไม่ถูกต้อง');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // เพิ่มหรืออัปเดตข้อมูล
        async function submitLink(e) {
            e.preventDefault();

            const id = document.getElementById('web-id').value;
            const category = document.getElementById('web-category').value;
            const name = document.getElementById('web-name').value;
            const url = document.getElementById('web-url').value;
            const btn = document.getElementById('btn-save');
            const originalText = btn.innerHTML;

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> PROCESSING...';
            btn.disabled = true;

            const orderInput = document.getElementById('web-order').value;
            let parsedOrder = orderInput === '' ? null : parseInt(orderInput, 10);
            if (parsedOrder === null) {
                const catLinks = currentLinks.filter(l => (l.category || 'My Work') === category);
                parsedOrder = catLinks.length;
            }

            const visible = document.getElementById('web-visible').checked;

            try {
                if (id) {
                    await updateDoc(doc(db, "links", id), {
                        name: name,
                        url: url,
                        category: category,
                        order: parsedOrder,
                        visible: visible
                    });
                } else {
                    await addDoc(collection(db, "links"), {
                        name: name,
                        url: url,
                        category: category,
                        order: parsedOrder,
                        visible: visible,
                        createdAt: serverTimestamp()
                    });
                }
                document.getElementById('add-form').reset();
                closeModal('add-modal');
            } catch (err) {
                console.error(err);
                alert('Operation Failed. Please check database permissions.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // เปิด Modal แบบมีข้อมูลเดิมสำหรับ Edit
        function openEditModal(id) {
            const link = currentLinks.find(l => l.id === id);
            if (!link) return;

            document.getElementById('web-id').value = link.id;
            document.getElementById('web-category').value = link.category || 'My Work';
            document.getElementById('web-name').value = link.name;
            document.getElementById('web-url').value = link.url;
            document.getElementById('web-order').value = link.order !== undefined ? link.order : '';
            document.getElementById('web-visible').checked = link.visible !== false;

            document.getElementById('modal-title').innerText = 'EDIT NODE';
            document.getElementById('btn-save').innerHTML = '<i class="fa-solid fa-save mr-2"></i> UPDATE DATA';
            document.getElementById('add-modal').classList.remove('hidden');
        }

        // ลบข้อมูล
        async function deleteLink(id) {
            if (confirm('ยืนยันการลบลิงก์นี้ออกจากระบบ?')) {
                try {
                    await deleteDoc(doc(db, "links", id));
                } catch (err) {
                    console.error(err);
                    alert('Delete Failed.');
                }
            }
        }

        // Utils
        function openAddModal() {
            document.getElementById('web-id').value = '';
            document.getElementById('add-form').reset();
            document.getElementById('web-visible').checked = true;
            document.getElementById('modal-title').innerText = 'ADD NEW NODE';
            document.getElementById('btn-save').innerHTML = '<i class="fa-solid fa-save mr-2"></i> INJECT DATA';
            document.getElementById('add-modal').classList.remove('hidden');
        }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function getIconForUrl(urlString) {
            try {
                const url = new URL(urlString);
                const domain = url.hostname;
                if (domain.includes('google')) return 'fa-brands fa-google';
                if (domain.includes('youtube')) return 'fa-brands fa-youtube';
                if (domain.includes('facebook')) return 'fa-brands fa-facebook';
                if (domain.includes('twitter') || domain.includes('x.com')) return 'fa-brands fa-twitter';
                if (domain.includes('instagram')) return 'fa-brands fa-instagram';
                if (domain.includes('github')) return 'fa-brands fa-github';
                if (domain.includes('netflix')) return 'fa-solid fa-film';
                if (domain.includes('stackoverflow')) return 'fa-brands fa-stack-overflow';
                return 'fa-solid fa-globe';
            } catch (e) { return 'fa-solid fa-link'; }
        }

        window.onclick = function (event) {
            if (event.target.id === 'add-modal') closeModal('add-modal');
            if (event.target.id === 'login-modal') closeModal('login-modal');
        }

        // ฟังก์ชันเลื่อนตำแหน่งหัวข้อขึ้น/ลง
        async function moveLink(id, direction) {
            const link = currentLinks.find(l => l.id === id);
            if (!link) return;

            const category = link.category || 'My Work';
            const catLinks = currentLinks.filter(l => (l.category || 'My Work') === category);

            const index = catLinks.findIndex(l => l.id === id);
            if (index === -1) return;

            let targetIndex = -1;
            if (direction === 'up' && index > 0) {
                targetIndex = index - 1;
            } else if (direction === 'down' && index < catLinks.length - 1) {
                targetIndex = index + 1;
            }

            if (targetIndex !== -1) {
                const otherLink = catLinks[targetIndex];
                
                let order1 = link.order !== undefined ? Number(link.order) : index;
                let order2 = otherLink.order !== undefined ? Number(otherLink.order) : targetIndex;

                if (order1 === order2) {
                    order1 = index;
                    order2 = targetIndex;
                }

                try {
                    await updateDoc(doc(db, "links", link.id), { order: order2 });
                    await updateDoc(doc(db, "links", otherLink.id), { order: order1 });
                } catch (err) {
                    console.error('Error swapping order:', err);
                    alert('Failed to update order. Check Firebase permissions.');
                }
            }
        }

        async function toggleVisibility(id, currentVisibility) {
            try {
                await updateDoc(doc(db, "links", id), {
                    visible: !currentVisibility
                });
            } catch (err) {
                console.error('Error toggling visibility:', err);
                alert('Failed to update visibility. Check Firebase permissions.');
            }
        }

        // ทำให้ฟังก์ชันใน module ใช้งานใน HTML tags ได้
        window.submitLink = submitLink;
        window.toggleMobileMenu = toggleMobileMenu;
        window.openAddModal = openAddModal;
        window.closeModal = closeModal;
        window.handleAdminAuthClick = handleAdminAuthClick;
        window.loginAdmin = loginAdmin;
        window.openEditModal = openEditModal;
        window.deleteLink = deleteLink;
        window.moveLink = moveLink;
        window.toggleVisibility = toggleVisibility;

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered successfully:', reg.scope))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>

</html>
